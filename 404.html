<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found | ASH-TRA</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#050914" />
    <link rel="icon" href="/brand/favicon-32.png" type="image/png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/site.css" />
  </head>
  <body data-page="404">
    <div class="site-stage" aria-hidden="true">
      <div class="site-stage__glow"></div>
      <div class="site-stage__grid"></div>
      <div class="site-stage__noise"></div>
    </div>
    <div data-site-header></div>

    <main class="empty-state">
      <section class="section">
        <div class="shell hero__grid">
          <article class="surface hero__copy" data-reveal>
            <span class="eyebrow">404</span>
            <h1 class="hero__title">That page is not in this part of the system.</h1>
            <p class="hero__lede">The cleaner move is heading back to the homepage or starting the project conversation from there.</p>
            <div class="hero__actions">
              <a class="button button--primary" href="/">Go home</a>
              <a class="button button--secondary" href="/start-project/">Start a project</a>
            </div>
          </article>

          <aside class="hero__visual surface" data-reveal data-tilt>
            <div class="scene" data-scene>
              <div class="scene__grid"></div>
              <div class="scene__orbit" data-depth="1"></div>
              <div class="scene__ring" data-depth="0.7"></div>
              <div class="scene__chip scene__chip--top" data-depth="0.8">Signal lost</div>
              <div class="scene__window scene__window--wide" data-depth="1.2">
                <img src="/assets/media/visual-process-signal.svg" alt="Abstract signal diagram representing a missing route." />
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <div data-site-footer></div>
    <script src="/assets/js/site-config.js"></script>
    <script src="/assets/js/site.js"></script>
  </body>
</html>
